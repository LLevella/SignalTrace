name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: npm run test:unit
      - run: npm run typecheck
      - run: npm run audit:prod
